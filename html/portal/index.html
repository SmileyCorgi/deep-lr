<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Portal — deep-lr</title>
<link rel="stylesheet" href="/html/portal/lib/portal.css" />
</head>
<body>
<div class="shell">
  <main class="main">
    <div class="topstrip">
      <div class="crumbs"><strong>deep-lr · Portal</strong></div>
      <div class="meta">
        <span id="generated"></span>
        <button class="open-cmd" onclick="Portal.openPalette()"><kbd>⌘K</kbd> search</button>
      </div>
    </div>
    <div class="dash" id="dash">
      <!-- LEFT: pins + ideas -->
      <div class="col-left">
        <section>
          <h3>Pinned topics</h3>
          <div id="pins"></div>
        </section>
        <section>
          <h3>Ideas backlog <span id="ideas-n" style="color:var(--muted);font-weight:400;font-size:11px;"></span></h3>
          <div id="ideas"></div>
        </section>
      </div>
      <!-- MIDDLE: activity stream -->
      <div class="col-mid">
        <section>
          <h3>Activity</h3>
          <div class="activity" id="activity"></div>
        </section>
      </div>
      <!-- RIGHT: counters + venue heatmap + synthesis -->
      <div class="col-right">
        <section>
          <h3>Corpus</h3>
          <div class="counters" id="counters"></div>
        </section>
        <section>
          <h3>Venue × Year</h3>
          <div id="heatmap"></div>
        </section>
        <section>
          <h3>Synthesis</h3>
          <div id="synthesis"></div>
        </section>
        <section>
          <h3>Health</h3>
          <div id="health" style="font-size:12px;color:var(--muted);line-height:1.55;"></div>
        </section>
      </div>
    </div>
  </main>
</div>
<script src="/html/portal/lib/portal.js" defer></script>
<script defer>
document.addEventListener("DOMContentLoaded", function () {
  Portal.mountRail("home");
  Portal.loadIndex().then(render);
});

// Pin list: hardcode topic slugs here to control order, or leave empty
// to auto-pin the 6 most recently updated topics.
const DEFAULT_PINS = [];

function fmtDaysAgo(yyyy_mm_dd) {
  if (!yyyy_mm_dd) return "";
  const d = new Date(yyyy_mm_dd + "T00:00:00Z");
  const now = new Date();
  const ms = now - d;
  const days = Math.floor(ms / (24 * 3600 * 1000));
  if (days < 0) return "today";
  if (days === 0) return "today";
  if (days === 1) return "1d ago";
  if (days < 30) return days + "d ago";
  if (days < 365) return Math.floor(days / 30) + "mo ago";
  return Math.floor(days / 365) + "y ago";
}

function render(idx) {
  // generated
  if (idx.generated) {
    document.getElementById("generated").textContent =
      "built " + idx.generated.replace("T", " ").replace("Z", " UTC");
  }
  renderPins(idx);
  renderIdeas(idx);
  renderActivity(idx);
  renderCounters(idx);
  renderHeatmap(idx);
  renderSynthesis(idx);
  renderHealth(idx);
}

function renderPins(idx) {
  const pinBox = document.getElementById("pins");
  let pins = DEFAULT_PINS;
  if (!pins.length) {
    pins = (idx.pages || [])
      .filter(function (p) { return p.type === "topic"; })
      .sort(function (a, b) { return (b.updated || "").localeCompare(a.updated || ""); })
      .slice(0, 6)
      .map(function (p) { return p.slug; });
  }
  const html = pins.map(function (slug) {
    const p = idx._bySlug[slug];
    if (!p) return "";
    const sources = (p.frontmatter && p.frontmatter.sources) || "";
    const sNum = typeof sources === "string" ? sources.match(/^\d+/) : null;
    const count = sNum ? sNum[0] + "p" : "";
    return '<a class="pin" href="/html/portal/page.html?slug=' +
             encodeURIComponent(slug) + '">' +
             '<div class="row1"><span>' + Portal.escapeHtml(slug) + "</span>" +
             '<span class="count">' + Portal.escapeHtml(count) + "</span></div>" +
             '<div class="row2"><span>' +
               Portal.escapeHtml((p.tags || []).slice(0, 2).join(" · ")) + "</span>" +
               "<span>" + Portal.escapeHtml(fmtDaysAgo(p.updated)) + "</span></div>" +
           "</a>";
  }).join("");
  pinBox.innerHTML = html;
}

function renderIdeas(idx) {
  const box = document.getElementById("ideas");
  const ideas = idx.ideas || [];
  document.getElementById("ideas-n").textContent = "(" + ideas.length + ")";
  if (!ideas.length) {
    box.innerHTML =
      '<div class="ideas-empty">No ideas yet. Append to <code>ideas/backlog.md</code> in Obsidian.</div>';
    return;
  }
  box.innerHTML = ideas.map(function (it) {
    return '<a class="pin" href="/ideas/backlog.md" target="_blank">' +
             '<div class="row1"><span>' + Portal.escapeHtml(it.title || "(untitled)") + "</span></div>" +
             '<div class="row2"><span>' + Portal.escapeHtml(it.trigger || it.sketch || "") + "</span>" +
             "<span>" + Portal.escapeHtml(it.date || "") + "</span></div>" +
           "</a>";
  }).join("");
}

function groupByPeriod(log) {
  const now = new Date();
  const groups = { today: [], week: [], earlier: [], older: [] };
  log.forEach(function (e) {
    const d = new Date(e.date + "T00:00:00Z");
    const days = Math.floor((now - d) / 86400000);
    if (days <= 0) groups.today.push(e);
    else if (days <= 7) groups.week.push(e);
    else if (days <= 30) groups.earlier.push(e);
    else groups.older.push(e);
  });
  return groups;
}

function renderActivity(idx) {
  const log = (idx.log || []).slice(0, 30);
  const groups = groupByPeriod(log);
  const sections = [
    ["today", "Today"],
    ["week", "This week"],
    ["earlier", "Last 30 days"],
    ["older", "Earlier"],
  ];
  const box = document.getElementById("activity");
  let html = "";
  sections.forEach(function (s) {
    const items = groups[s[0]];
    if (!items.length) return;
    html += '<div class="day-group"><div class="label">' + s[1] + " · " + items.length + "</div>";
    items.forEach(function (e) {
      const linksHtml = (e.links || []).slice(0, 12).map(function (slug) {
        const exists = idx._bySlug.hasOwnProperty(slug);
        const cls = exists ? "wiki" : "wiki broken";
        const href = exists
          ? "/html/portal/page.html?slug=" + encodeURIComponent(slug)
          : "#";
        return '<a class="' + cls + '" data-slug="' + Portal.escapeAttr(slug) +
               '" href="' + href + '">[[' + Portal.escapeHtml(slug) + "]]</a>";
      }).join(" · ");
      const bodySnip = collapseBody(e.body);
      html += '<div class="entry op-' + Portal.escapeAttr(e.op) + '">' +
                '<div class="head">' +
                  '<span class="date">' + Portal.escapeHtml(e.date) + "</span>" +
                  '<span class="op">' + Portal.escapeHtml(e.op) + "</span>" +
                  '<span class="subj">' + Portal.escapeHtml(e.subject) + "</span>" +
                "</div>" +
                '<div class="body">' + bodySnip + "</div>" +
                (linksHtml ? '<div style="margin-top:4px;font-size:11.5px">' + linksHtml + "</div>" : "") +
              "</div>";
    });
    html += "</div>";
  });
  box.innerHTML = html || '<div style="color:var(--muted);font-size:12px;">No log entries.</div>';
  Portal.attachWikiHovercards(box, idx);

  // expand-on-click
  box.querySelectorAll(".entry .body").forEach(function (el) {
    el.addEventListener("click", function () { el.classList.toggle("expanded"); });
    el.title = "click to expand";
    el.style.cursor = "pointer";
  });
}

function collapseBody(body) {
  if (!body) return "";
  // Render bullets minimally; preserve <a class="wiki"> from rough scan.
  const lines = body.split("\n");
  let html = "";
  let inUl = false;
  lines.forEach(function (l) {
    const m = l.match(/^- (.+)$/);
    if (m) {
      if (!inUl) { html += "<ul>"; inUl = true; }
      html += "<li>" + inlineMd(m[1]) + "</li>";
    } else {
      if (inUl) { html += "</ul>"; inUl = false; }
      if (l.trim()) html += "<p>" + inlineMd(l) + "</p>";
    }
  });
  if (inUl) html += "</ul>";
  return html;
}

// Tiny inline-md: backticks → <code>, [[slug]] → wiki link, **bold** → <strong>.
function inlineMd(s) {
  let out = Portal.escapeHtml(s);
  out = out.replace(/\[\[([A-Za-z0-9][A-Za-z0-9._\-\/]*)(?:\|([^\]]+))?\]\]/g, function (_m, slug, disp) {
    const label = (disp || slug);
    return '<a class="wiki" data-slug="' + slug + '" href="/html/portal/page.html?slug=' + encodeURIComponent(slug) + '">' + Portal.escapeHtml(label) + "</a>";
  });
  out = out.replace(/`([^`]+)`/g, "<code>$1</code>");
  out = out.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
  return out;
}

function renderCounters(idx) {
  const s = idx.stats;
  const items = [
    ["topics", s.topics, "/html/portal/topics.html"],
    ["entities", s.entities, "/html/portal/entities.html"],
    ["synthesis", s.synthesis, "/html/portal/synthesis.html"],
    ["log", s.log_entries, "/html/portal/activity.html"],
    ["manifest", s.manifest_papers, "#"],
    ["pdfs", s.pdfs_on_disk, "#"],
  ];
  const box = document.getElementById("counters");
  box.innerHTML = items.map(function (it) {
    return '<a class="stat" href="' + it[2] + '">' +
             '<span class="n">' + (it[1] || 0) + "</span>" +
             '<span class="lab">' + it[0] + "</span>" +
           "</a>";
  }).join("");
}

function renderHeatmap(idx) {
  const vy = idx.stats.venue_year || {};
  // Pick the top venues by total count, top years.
  const venues = Object.keys(vy).filter(function (v) { return v; });
  const totals = {};
  venues.forEach(function (v) {
    totals[v] = Object.values(vy[v]).reduce(function (a, b) { return a + b; }, 0);
  });
  venues.sort(function (a, b) { return totals[b] - totals[a]; });
  const top = venues.slice(0, 6);

  const yearsSet = new Set();
  top.forEach(function (v) { Object.keys(vy[v]).forEach(function (y) { yearsSet.add(y); }); });
  const years = Array.from(yearsSet).sort();

  let html = '<table class="heatmap"><thead><tr><th></th>';
  years.forEach(function (y) { html += "<th>" + y + "</th>"; });
  html += '<th>Σ</th></tr></thead><tbody>';
  top.forEach(function (v) {
    html += "<tr><th style='text-align:left'>" + Portal.escapeHtml(v) + "</th>";
    years.forEach(function (y) {
      const n = (vy[v] && vy[v][y]) || 0;
      const bucket = n === 0 ? 0 : n < 2 ? 1 : n < 6 ? 2 : n < 15 ? 3 : 4;
      html += '<td class="h' + bucket + '">' + (n || "·") + "</td>";
    });
    html += '<td class="h' + (totals[v] < 6 ? 1 : totals[v] < 15 ? 2 : 3) + '"><strong>' + totals[v] + "</strong></td>";
    html += "</tr>";
  });
  html += "</tbody></table>";
  document.getElementById("heatmap").innerHTML = html;
}

function renderSynthesis(idx) {
  const box = document.getElementById("synthesis");
  const syns = (idx.pages || []).filter(function (p) { return p.type === "synthesis"; });
  // newest first by updated
  syns.sort(function (a, b) { return (b.updated || "").localeCompare(a.updated || ""); });
  box.innerHTML = syns.map(function (p) {
    return '<a class="syn-card" href="/html/portal/page.html?slug=' +
             encodeURIComponent(p.slug) + '">' +
             '<div class="title">' + Portal.escapeHtml(p.title || p.slug) + "</div>" +
             '<div class="summary">' + Portal.escapeHtml(p.tldr || "") + "</div>" +
           "</a>";
  }).join("");
}

function renderHealth(idx) {
  const s = idx.stats;
  const bl = idx.broken_links ? idx.broken_links.length : 0;
  const orphans = idx.orphans ? idx.orphans.length : 0;
  document.getElementById("health").innerHTML =
    "broken wikilinks: <strong style='color:var(--accent-warn)'>" + bl + "</strong><br>" +
    "orphan entities: <strong>" + orphans + "</strong><br>" +
    "graph: " + (idx.graph.nodes.length) + " nodes · " + (idx.graph.edges.length) + " edges";
}
</script>
</body>
</html>
